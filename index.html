<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARMY Cultivation Quiz · SEPLAG-RJ</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <main id="app" class="app-shell">
    <section id="authScreen" class="auth-screen">
      <div class="auth-card glass-card">
        <div class="brand-mark">紫</div>
        <p class="eyebrow">SEPLAG-RJ · FGV 2026</p>
        <h1>ARMY Cultivation Quiz</h1>
        <p class="lead">Estude para concurso em uma jornada interativa com energia BTS, The Untamed, coelhos guardiões e muito progresso salvo.</p>

        <div class="auth-tabs" role="tablist">
          <button class="auth-tab active" data-auth-mode="signin">Entrar</button>
          <button class="auth-tab" data-auth-mode="signup">Criar conta</button>
        </div>

        <label class="field-label">E-mail
          <input id="authEmail" type="email" autocomplete="email" placeholder="seu@email.com" />
        </label>
        <label class="field-label">Senha
          <input id="authPass" type="password" autocomplete="current-password" placeholder="mínimo 6 caracteres" />
        </label>
        <p id="authMsg" class="auth-msg" aria-live="polite"></p>
        <button id="authSubmit" class="primary-btn">Entrar na jornada</button>
        <button id="guestBtn" class="ghost-btn">Continuar como visitante</button>
      </div>
    </section>

    <section id="mainScreen" class="main-screen hidden">
      <aside class="side-panel glass-card">
        <div class="profile-block">
          <div class="brand-mark small">兔</div>
          <div>
            <p class="eyebrow">Cultivation desk</p>
            <h2>SEPLAG Quest</h2>
          </div>
        </div>
        <div id="syncStatus" class="sync-pill">modo visitante</div>
        <nav class="nav-list" aria-label="Navegação principal">
          <button class="nav-item active" data-view="home">✦ Portal</button>
          <button class="nav-item" data-view="practice">⚔ Praticar</button>
          <button class="nav-item" data-view="review">☯ Revisão</button>
          <button class="nav-item" data-view="analytics">卷 Desempenho</button>
        </nav>
        <div class="side-footer">
          <button id="logoutBtn" class="mini-btn">Sair / trocar login</button>
          <button id="focusModeBtn" class="mini-btn">Modo foco</button>
        </div>
      </aside>

      <section class="content-panel">
        <header class="topbar glass-card">
          <div>
            <p class="eyebrow">BTS × The Untamed × Concurso</p>
            <h1 id="screenTitle">Portal da Jornada</h1>
          </div>
          <div class="top-actions">
            <div class="stat-chip"><span id="totalQuestions">0</span><small>questões</small></div>
            <div class="stat-chip"><span id="xpValue">0</span><small>XP</small></div>
            <button id="themeBtn" class="icon-btn" title="Alternar atmosfera">☾</button>
          </div>
        </header>

        <section id="homeView" class="view active-view"></section>
        <section id="practiceView" class="view"></section>
        <section id="quizView" class="view"></section>
        <section id="reviewView" class="view"></section>
        <section id="analyticsView" class="view"></section>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="questoes.js"></script>
  <script src="app.js"></script>
</body>
</html>
